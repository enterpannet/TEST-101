name: Deploy to Ubuntu with PM2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build (if script exists)
        run: |
          if [ -f package.json ]; then
            npm run build --if-present
          fi
      - name: Copy build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/var/www/xcvr"

      - name: Restart PM2 on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            APP_DIR=/var/www/xcvr
            PM2_NAME=xcvr

            # สร้างโฟลเดอร์ถ้ายังไม่มี
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # ติดตั้ง pm2 ถ้ายังไม่มี
            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            # รัน/รีสตาร์ทด้วย pm2 ผ่าน ecosystem.config.cjs (CommonJS)
            if pm2 list | grep -q "$PM2_NAME"; then
              pm2 reload ecosystem.config.cjs --only "$PM2_NAME" --env production
            else
              pm2 start ecosystem.config.cjs --only "$PM2_NAME" --env production
            fi

            # ให้ pm2 รันอัตโนมัติหลัง reboot
            pm2 save
